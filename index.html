<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV Ao Vivo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      color: #fff;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      padding: 24px 20px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 2px solid #e63946;
    }

    h1 span { color: #e63946; }

    .channel {
      background: #111118;
      border: 1px solid #1e1e2e;
      border-radius: 6px;
      padding: 14px 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .channel-name {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      min-width: 120px;
    }

    .divider {
      width: 1px;
      height: 24px;
      background: #2a2a3a;
    }

    .embeds {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .embed-btn {
      padding: 7px 18px;
      border: 1px solid #333;
      background: transparent;
      color: #aaa;
      font-size: 13px;
      cursor: pointer;
      border-radius: 4px;
      text-decoration: none;
      transition: all 0.15s;
      letter-spacing: 0.5px;
      display: inline-block;
    }

    .embed-btn:hover,
    .embed-btn:focus {
      border-color: #e63946;
      color: #fff;
      background: #1a0a0e;
      outline: none;
    }
  </style>
</head>
<body>

  <h1>TV <span>AO VIVO</span></h1>

  <div id="channel-list"></div>

  <script>
    const channels = [
      {
        name: "SporTV",
        embeds: [
          { label: "Opção 1", url: "https://www4.embedtv.cv/sportv" },
          { label: "Opção 2", url: "https://1.embeddecanais.com/sportv/" },
          { label: "Opção 3", url: "https://rdcanais.com/sportv" }
        ]
      }
      // Adicione mais canais aqui
    ];

    const list = document.getElementById('channel-list');

    channels.forEach(ch => {
      const div = document.createElement('div');
      div.className = 'channel';

      const name = document.createElement('div');
      name.className = 'channel-name';
      name.textContent = ch.name;

      const divider = document.createElement('div');
      divider.className = 'divider';

      const embeds = document.createElement('div');
      embeds.className = 'embeds';

      ch.embeds.forEach(em => {
        const a = document.createElement('a');
        a.className = 'embed-btn';
        a.href = em.url;
        a.target = '_blank';
        a.rel = 'noopener';
        a.textContent = em.label;
        embeds.appendChild(a);
      });

      div.appendChild(name);
      div.appendChild(divider);
      div.appendChild(embeds);
      list.appendChild(div);
    });
  </script>

</body>
</html>
